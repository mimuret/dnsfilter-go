name: Release Patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-patch
  cancel-in-progress: false

jobs:
  release-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create next patch tag
        id: tag
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ -z "$latest" ]; then
            next="v0.0.1"
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<< "$ver"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            echo "Tag ${next} already exists."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag -a "$next" -m "Release ${next}"
          git push origin "$next"

          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.tag.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --title "${{ steps.tag.outputs.tag }}" --generate-notes
